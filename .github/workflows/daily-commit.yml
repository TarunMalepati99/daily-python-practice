   permissions:
     contents: write

name: Daily Commit

on:
  schedule:
    - cron: "0 3 * * *"  # Runs every day at 3 AM UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run Python Script
        run: |
          python main.py

      - name: Commit Changes
        run: |
          git config --global user.email "TarunMalepati99@users.noreply.github.com"
          git config --global user.name "TarunMalepati99"
          git commit -am "Daily Commit" || echo "Nothing to commit"
          git push
